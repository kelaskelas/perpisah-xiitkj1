<!DOCTYPE html>
<html lang="id">
<head>

<body class="no-scroll">

    <section class="hero-section">
        <div class="hero-content" data-aos="fade">
            <p class="greeting">Halo, <span id="target-name">Kawan</span></p>
            <h1>Untuk <br><span>XII TKJ 2026</span></h1>
            <button class="open-button" onclick="openFarewell()">Explore Reels</button>
        </div>
    </section>

    <main id="main-content" style="display: none;">
        
        <!-- VIDEO REELS (Loop & Ratio Fix) -->
        <section class="content-section">
            <h2 data-aos="fade-up">Memory Reels</h2>
            <div class="swiper videoSwiper">
                <div id="display-videos" class="swiper-wrapper">
                    <!-- Loaded via JS -->
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </section>

<section id="guestbook-section" class="content-section">
    <div class="card-form modern-form" data-aos="fade-up">
        <h3>Tinggalkan Pesan ✨</h3>
        <form id="farewell-form">
            <input type="hidden" name="type" value="message">
            <div class="form-input-group">
                <input type="text" name="Nama" placeholder="Nama kamu..." required>
            </div>
            <div class="form-input-group">
                <textarea name="Pesan" rows="3" placeholder="Tulis kenangan atau pesan untuk teman-teman..." required></textarea>
            </div>
            <button type="submit" id="submit-button" class="submit-btn">Kirim Pesan</button>
        </form>
    </div>

    <div class="message-feed-container" data-aos="fade-up">
        <h4 style="text-align: left; margin-bottom: 20px; font-size: 1.2rem;">Pesan Komunitas</h4>
        <div id="display-messages"></div>
    </div>
</section>

<footer style="padding: 40px 20px; background: #fff; border-top: 1px solid #eee;">
    <p style="text-align: center; font-weight: bold; color: #888; margin: 0;">
         website tinggal kenangan - XII TKJ
